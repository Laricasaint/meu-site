<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFs - Meus Estudos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #2d6a9f;
      color: white;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header a {
      color: white;
      text-decoration: none;
      font-size: 1.4rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    main {
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
    }

    .materia {
      background: white;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .materia-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      cursor: pointer;
      user-select: none;
      background: white;
      transition: background 0.2s;
    }

    .materia-header:hover {
      background: #f0f6fc;
    }

    .materia-header h2 {
      margin: 0;
      font-size: 1rem;
      color: #2d6a9f;
    }

    .materia-header .seta {
      font-size: 0.9rem;
      color: #999;
      transition: transform 0.2s;
    }

    .materia-header.aberto .seta {
      transform: rotate(180deg);
    }

    .materia-conteudo {
      display: none;
      padding: 0 24px 16px;
      border-top: 1px solid #e8f0f8;
    }

    .materia-conteudo.aberto {
      display: block;
    }

    .pdf-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      margin-top: 8px;
      background: #f5f8fb;
      transition: background 0.2s;
      font-size: 0.95rem;
    }

    .pdf-link:hover {
      background: #ddeaf5;
    }

    .adicionar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 2px dashed #c0d4e8;
      color: #7aadcf;
      font-size: 0.85rem;
      cursor: pointer;
      background: none;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">← Voltar</a>
    <h1>📄 PDFs</h1>
  </header>

  <main>

    <div class="materia">

        <a class="pdf-link" href="https://drive.google.com/file/d/1DazacGOLKHLlUamdVGQxPu2-YQ9eyIKL/view?usp=drive_link" target="_blank">📄 Nome do PDF</a>
        <a class="pdf-link" href="SEU_LINK" target="_blank">📄 Nome do PDF</a>

    </div>

    <div class="materia">

      </div>
      <div class="materia-conteudo">

        <a class="pdf-link" href="SEU_LINK" target="_blank">📄 Nome do PDF</a>

    </div>

    <div class="materia">
      <div class="materia-header" onclick="toggle(this)">
        <h2>🎲 Probabilidade</h2>
        <span class="seta">▼</span>
      </div>
      <div class="materia-conteudo">
        <a class="pdf-link" href="SEU_LINK" target="_blank">📄 Nome do PDF</a>
        <a class="pdf-link" href="SEU_LINK" target="_blank">📄 Nome do PDF</a>
      </div>
    </div>

    <div class="materia">
      <div class="materia-header" onclick="toggle(this)">
        <h2>⚠️ Teoria do Risco</h2>

      <div class="materia-conteudo">

    </div>

  </main>

  <script>
    function toggle(header) {
      header.classList.toggle('aberto');
      const conteudo = header.nextElementSibling;
      conteudo.classList.toggle('aberto');
    }
  </script>

</body>
</html>
