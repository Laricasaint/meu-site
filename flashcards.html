<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards - Meus Estudos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})">
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0; }
    header { background: #2d6a9f; color: white; padding: 20px 30px; display: flex; align-items: center; gap: 16px; }
    header a { color: white; text-decoration: none; font-size: 1.4rem; }
    header h1 { margin: 0; font-size: 1.4rem; }
    main { padding: 30px; max-width: 700px; margin: 0 auto; }

    /* CONFIG */
    .config-card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .config-card h2 { margin: 0 0 18px; color: #2d6a9f; font-size: 1.05rem; }
    .materias-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .mat-btn { padding: 12px 16px; border-radius: 10px; border: 2px solid #b0cfe8; background: white; color: #2d6a9f; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; text-align: center; }
    .mat-btn:hover { background: #e8f2fb; }
    .mat-btn.ativo { background: #2d6a9f; color: white; border-color: #2d6a9f; }
    .qtd-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .qtd-btn { width: 48px; height: 48px; border-radius: 10px; border: 2px solid #b0cfe8; background: white; color: #2d6a9f; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .qtd-btn:hover, .qtd-btn.ativo { background: #2d6a9f; color: white; border-color: #2d6a9f; }
    .btn-iniciar { width: 100%; padding: 14px; background: #2d6a9f; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .btn-iniciar:hover { background: #1f5080; }

    /* ESTUDO */
    #tela-estudo { display: none; }
    .progresso-bar { background: #dde8f0; border-radius: 20px; height: 8px; margin-bottom: 6px; }
    .progresso-fill { background: #2d6a9f; height: 8px; border-radius: 20px; transition: width 0.4s; }
    .progresso-texto { font-size: 0.82rem; color: #888; margin-bottom: 20px; display: flex; justify-content: space-between; }

    /* CARD */
    .flashcard { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 16px; }

    /* FRENTE — pergunta + campo de resposta */
    .card-frente { padding: 28px; border-top: 5px solid #2d6a9f; }
    .card-label { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.08em; color: #2d6a9f; margin-bottom: 14px; }
    .card-pergunta { font-size: 1.05rem; color: #222; line-height: 1.6; margin-bottom: 20px; min-height: 60px; }
    .resposta-input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 2px solid #d0dde8; font-size: 0.95rem; font-family: Arial, sans-serif; resize: vertical; min-height: 80px; background: #f8fafc; transition: border 0.2s; }
    .resposta-input:focus { outline: none; border-color: #2d6a9f; background: white; }
    .btn-verificar { width: 100%; padding: 13px; background: #2d6a9f; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
    .btn-verificar:hover { background: #1f5080; }
    .btn-verificar:disabled { background: #90b4d0; cursor: not-allowed; }

    /* VERSO — gabarito */
    .card-verso { display: none; padding: 24px 28px; border-top: 3px solid #eee; }
    .card-verso.show { display: block; }

    .comparacao { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    @media(max-width: 500px) { .comparacao { grid-template-columns: 1fr; } }

    .box-resposta { border-radius: 10px; padding: 14px; }
    .box-resposta .box-label { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .box-sua { background: #f5f8fb; border: 2px solid #d0dde8; }
    .box-sua .box-label { color: #666; }
    .box-gabarito { background: #eef8f2; border: 2px solid #b0e0c0; }
    .box-gabarito .box-label { color: #2e9e5b; }
    .box-texto { font-size: 0.92rem; color: #333; line-height: 1.6; }

    .dica-card { background: #fff8e8; border-left: 3px solid #f5c842; padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 0.85rem; color: #7a5500; line-height: 1.6; margin-bottom: 16px; }
    .dica-card strong { display: block; margin-bottom: 3px; }

    /* Botões de avaliação */
    .acoes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .acao-btn { padding: 11px; border-radius: 10px; border: none; font-size: 0.88rem; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .btn-errei  { background: #fdf0f0; color: #d94f4f; border: 2px solid #f5c0c0; }
    .btn-errei:hover  { background: #fad5d5; }
    .btn-revisar { background: #fff8e8; color: #b07a00; border: 2px solid #f5e0a0; }
    .btn-revisar:hover { background: #faecc0; }
    .btn-acertei { background: #eef8f2; color: #2e9e5b; border: 2px solid #b0e0c0; }
    .btn-acertei:hover { background: #d0f0dc; }

    /* RESULTADO */
    #tela-resultado { display: none; }
    .resultado-card { background: white; border-radius: 16px; padding: 36px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .resultado-emoji { font-size: 3rem; margin-bottom: 12px; }
    .resultado-titulo { font-size: 1.3rem; font-weight: bold; color: #1a4f78; margin-bottom: 8px; }
    .resultado-stats { display: flex; justify-content: center; gap: 28px; margin: 24px 0; }
    .stat { text-align: center; }
    .stat-num { font-size: 2.2rem; font-weight: bold; }
    .stat-label { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .stat.verde .stat-num { color: #2e9e5b; }
    .stat.amarelo .stat-num { color: #b07a00; }
    .stat.verm .stat-num { color: #d94f4f; }
    .btns-resultado { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
    .btn-res { padding: 12px 24px; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
    .btn-rever { background: #fff8e8; color: #b07a00; border: 2px solid #f5e0a0; }
    .btn-nova  { background: #2d6a9f; color: white; }
    .btn-nova:hover { background: #1f5080; }
  </style>
</head>
<body>

<header>
  <a href="index.html">← Voltar</a>
  <h1>🃏 Flashcards</h1>
</header>

<main>

  <!-- CONFIG -->
  <div id="tela-config">
    <div class="config-card">
      <h2>📚 Escolha a matéria</h2>
      <div class="materias-grid">
        <button class="mat-btn ativo" onclick="selecionarMateria('atuarial',this)">📐 Mat. Atuarial</button>
        <button class="mat-btn" onclick="selecionarMateria('probabilidade',this)">🎲 Probabilidade</button>
        <button class="mat-btn" onclick="selecionarMateria('financeira',this)">💰 Mat. Financeira</button>
        <button class="mat-btn" onclick="selecionarMateria('risco',this)">⚠️ Teoria do Risco</button>
        <button class="mat-btn" onclick="selecionarMateria('todas',this)">🔀 Todas misturadas</button>
      </div>
      <h2>🔢 Quantos cards por sessão?</h2>
      <div class="qtd-row">
        <button class="qtd-btn ativo" onclick="selecionarQtd(5,this)">5</button>
        <button class="qtd-btn" onclick="selecionarQtd(10,this)">10</button>
        <button class="qtd-btn" onclick="selecionarQtd(15,this)">15</button>
        <button class="qtd-btn" onclick="selecionarQtd(20,this)">20</button>
        <button class="qtd-btn" onclick="selecionarQtd(999,this)">Todos</button>
      </div>
      <button class="btn-iniciar" onclick="iniciarSessao()">🚀 Iniciar sessão</button>
    </div>
  </div>

  <!-- ESTUDO -->
  <div id="tela-estudo">
    <div class="progresso-bar"><div class="progresso-fill" id="prog-fill"></div></div>
    <div class="progresso-texto">
      <span id="prog-texto">Card 1 de 10</span>
      <span id="prog-rest"></span>
    </div>

    <div class="flashcard">
      <!-- FRENTE: pergunta + campo para digitar -->
      <div class="card-frente">
        <div class="card-label">📝 Sua resposta</div>
        <div class="card-pergunta" id="card-pergunta"></div>
        <textarea class="resposta-input" id="resposta-input" placeholder="Digite sua resposta aqui..." rows="3"></textarea>
        <button class="btn-verificar" id="btn-verificar" onclick="verificar()">Ver resposta correta →</button>
      </div>

      <!-- VERSO: comparação -->
      <div class="card-verso" id="card-verso">
        <div class="comparacao">
          <div class="box-resposta box-sua">
            <div class="box-label">Sua resposta</div>
            <div class="box-texto" id="sua-resposta"></div>
          </div>
          <div class="box-resposta box-gabarito">
            <div class="box-label">✅ Gabarito</div>
            <div class="box-texto" id="gabarito-texto"></div>
          </div>
        </div>
        <div class="dica-card" id="dica-texto"></div>
        <div class="acoes">
          <button class="acao-btn btn-errei"   onclick="avaliar('errei')">❌ Errei</button>
          <button class="acao-btn btn-revisar" onclick="avaliar('revisar')">🔁 Revisar</button>
          <button class="acao-btn btn-acertei" onclick="avaliar('acertei')">✅ Acertei</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULTADO -->
  <div id="tela-resultado">
    <div class="resultado-card">
      <div class="resultado-emoji" id="res-emoji">🎉</div>
      <div class="resultado-titulo" id="res-titulo">Sessão concluída!</div>
      <div class="resultado-stats">
        <div class="stat verde"><div class="stat-num" id="res-acertei">0</div><div class="stat-label">Acertei</div></div>
        <div class="stat amarelo"><div class="stat-num" id="res-revisar">0</div><div class="stat-label">Revisar</div></div>
        <div class="stat verm"><div class="stat-num" id="res-errei">0</div><div class="stat-label">Errei</div></div>
      </div>
      <div class="btns-resultado">
        <button class="btn-res btn-rever" onclick="rever()">🔁 Refazer os que errei</button>
        <button class="btn-res btn-nova"  onclick="novaSessao()">🆕 Nova sessão</button>
      </div>
    </div>
  </div>

</main>

<script>
const banco = {
  atuarial: [
    { f: "O que é $l_x$?", v: "$l_x$ = número de sobreviventes à idade exata $x$ numa coorte inicial $l_0$", d: "💡 Lembre: $l_{x+1} = l_x - d_x$" },
    { f: "Como calcular $d_x$?", v: "$d_x = l_x - l_{x+1} = q_x \\cdot l_x$", d: "💡 Óbitos entre $x$ e $x+1$. Duas formas de calcular!" },
    { f: "O que é $q_x$ e como calcular?", v: "$q_x = d_x / l_x = 1 - l_{x+1}/l_x$", d: "💡 Probabilidade de morrer antes de $x+1$. Entre 0 e 1." },
    { f: "O que é $p_x$ e qual sua relação com $q_x$?", v: "$p_x = 1 - q_x = l_{x+1}/l_x$", d: "💡 Complementar de $q_x$. Prob. de sobreviver de $x$ a $x+1$." },
    { f: "Como calcular $_np_x$?", v: "$_np_x = l_{x+n}/l_x$", d: "💡 Prob. de sobreviver $n$ anos. Também é produto: $p_x \\cdot p_{x+1} \\cdots p_{x+n-1}$" },
    { f: "Como calcular $_nq_x$?", v: "$_nq_x = 1 - {_np_x} = (l_x - l_{x+n})/l_x$", d: "💡 Prob. de morrer dentro de $n$ anos." },
    { f: "O que é o comutador $D_x$?", v: "$D_x = l_x \\cdot v^x$, onde $v = 1/(1+i)$", d: "💡 Base de todos os comutadores. $v$ = fator de desconto." },
    { f: "Como calcular $N_x$?", v: "$N_x = D_x + D_{x+1} + \\cdots + D_\\omega$", d: "💡 Soma acumulada dos $D$. Usada em rendas vitalícias." },
    { f: "Fórmula da renda vitalícia antecipada?", v: "$\\ddot{a}_x = N_x / D_x$", d: "💡 Pagamentos no INÍCIO. Postecipada: $a_x = N_{x+1}/D_x$" },
    { f: "Fórmula da renda temporária antecipada?", v: "$\\ddot{a}_{x:\\overline{n}|} = (N_x - N_{x+n})/D_x$", d: "💡 Limitada a $n$ anos. Diferida: $(N_{x+k} - N_{x+k+n})/D_x$" },
    { f: "Qual é a identidade fundamental das rendas?", v: "$\\ddot{a}_{x:\\overline{n}|} + {_nE_x} \\cdot \\ddot{a}_{x+n} = \\ddot{a}_x$", d: "💡 Temporária + Diferida = Vitalícia. Sempre use para verificar!" },
    { f: "Fórmula do seguro vida inteira $A_x$?", v: "$A_x = M_x / D_x$", d: "💡 Paga 1 no final do ano de morte. $M_x = C_x + C_{x+1} + \\cdots$" },
    { f: "Fórmula do dote puro $_nE_x$?", v: "$_nE_x = D_{x+n}/D_x = (l_{x+n}/l_x) \\cdot v^n$", d: "💡 Paga 1 se sobreviver $n$ anos. Fator de desconto atuarial." },
    { f: "Relação entre $A_x$ e $\\ddot{a}_x$?", v: "$A_x = 1 - d \\cdot \\ddot{a}_x$, onde $d = i/(1+i)$", d: "💡 Permite converter seguro em renda e vice-versa." },
    { f: "O que é a reserva prospectiva?", v: "$_tV = VP(\\text{benef. futuros}) - VP(\\text{prêm. futuros})$", d: "💡 Olha para FRENTE. Retrospectiva olha para o PASSADO. Mesmo resultado!" },
  ],
  probabilidade: [
    { f: "Fórmula da probabilidade condicional?", v: "$P(A|B) = P(A \\cap B) / P(B)$", d: "💡 Prob. de A dado que B ocorreu." },
    { f: "Quando A e B são independentes?", v: "$P(A \\cap B) = P(A) \\cdot P(B)$", d: "💡 Independência ≠ exclusão mútua!" },
    { f: "Enuncie o Teorema de Bayes.", v: "$P(A_i|B) = P(B|A_i) \\cdot P(A_i) / \\sum_j P(B|A_j) \\cdot P(A_j)$", d: "💡 Atualiza probabilidades com nova evidência." },
    { f: "Média e variância da Poisson($\\lambda$)?", v: "$E[X] = Var[X] = \\lambda$", d: "💡 Média = Variância. Único caso assim! Frequência de sinistros." },
    { f: "Média e variância da Binomial($n$,$p$)?", v: "$E = np$; $Var = np(1-p)$", d: "💡 Var < Média. Ao contrário da Binomial Negativa." },
    { f: "Propriedade da falta de memória da Exponencial?", v: "$P(X > s+t \\mid X > s) = P(X > t)$", d: "💡 Única distribuição contínua com esta propriedade!" },
    { f: "Média e variância da Exponencial($\\lambda$)?", v: "$E = 1/\\lambda$; $Var = 1/\\lambda^2$; $P(X>t) = e^{-\\lambda t}$", d: "💡 Lembre: $e^{-1} \\approx 0{,}368$; $e^{-2} \\approx 0{,}135$" },
    { f: "Identidade fundamental dos momentos?", v: "$E[X^2] = Var(X) + [E(X)]^2$", d: "💡 Usada em todo cálculo de variância!" },
    { f: "Valores de z para IC 95%, 99% e 90%?", v: "$z_{0{,}025} = 1{,}96$ (95%); $z_{0{,}005} = 2{,}576$ (99%); $z_{0{,}05} = 1{,}645$ (90%)", d: "💡 Memorize os três!" },
  ],
  financeira: [
    { f: "Fórmula do valor futuro em juros compostos?", v: "$VF = VP \\cdot (1+i)^n$", d: "💡 Nunca use juros simples para prazos longos!" },
    { f: "Como converter taxa mensal para anual?", v: "$i_a = (1 + i_m)^{12} - 1$", d: "💡 $(1{,}005)^{12} \\approx 1{,}0617$ → taxa de 6,17% ao ano." },
    { f: "Qual a diferença entre taxa nominal e efetiva?", v: "$12 \\times 0{,}5\\% = 6\\%$ é NOMINAL. Efetiva $= (1{,}005)^{12}-1 = 6{,}17\\%$", d: "💡 NUNCA some taxas mensais para obter a anual!" },
    { f: "Fórmula da anuidade postecipada (VP)?", v: "$VP = PMT \\cdot [1-(1+i)^{-n}] / i$", d: "💡 1º pagamento após 1 período. Antecipada: multiplica por $(1+i)$." },
    { f: "Fórmula da perpetuidade?", v: "$VP = PMT/i$ (postecipada); $VP = PMT/d$ (antecipada)", d: "💡 $d = i/(1+i)$. Renda que dura para sempre." },
    { f: "Diferença entre Price e SAC?", v: "Price: parcela CONSTANTE, amortização crescente. SAC: parcela DECRESCENTE, amortização constante $= VP/n$.", d: "💡 Juros totais no Price > SAC. Saldo SAC decai linearmente." },
    { f: "Equação de Fisher?", v: "$(1 + i_{nom}) = (1 + i_{real})(1 + \\pi)$", d: "💡 $\\pi$ = inflação. Relaciona taxa real, nominal e inflação." },
  ],
  risco: [
    { f: "Fórmulas de $E[S]$ e $Var[S]$ no modelo coletivo?", v: "$E[S] = E[N] \\cdot E[Y]$; $Var[S] = E[N]\\cdot Var[Y] + Var[N]\\cdot(E[Y])^2$", d: "💡 $N$ = frequência, $Y$ = severidade. Muito cobrado!" },
    { f: "O que é resseguro XL vs Stop Loss?", v: "XL: paga $\\max(0, S - \\text{Retenção})$ por sinistro. Stop Loss: paga $\\max(0, S_{total} - \\text{Limite})$ sobre o agregado.", d: "💡 XL = sinistro individual. Stop Loss = resultado total." },
    { f: "Mínimo de exponenciais independentes?", v: "$\\min(\\text{Exp}(\\lambda_1),\\ldots,\\text{Exp}(\\lambda_k)) \\sim \\text{Exp}(\\sum \\lambda_i)$", d: "💡 Tempo até o PRIMEIRO sinistro com $k$ riscos." },
    { f: "Seleção adversa vs risco moral?", v: "Adversa: PRÉ-contrato (mais arriscados atraídos). Moral: PÓS-contrato (comportamento muda após contratar).", d: "💡 Adversa = ANTES. Moral = DEPOIS. Nunca confundir!" },
    { f: "O que é a Binomial Negativa em modelos de risco?", v: "Mistura Poisson-Gama. Modela frequência com heterogeneidade. $Var > E$ (superdispersão).", d: "💡 Poisson: $E=Var$. BN: $Var>E$. Binomial: $Var<E$." },
  ]
};

let materiaAtual = 'atuarial', qtdAtual = 5;
let deck = [], indice = 0;
let resultados = {acertei:0, revisar:0, errei:0};
let cardsMarcados = [];

function selecionarMateria(m, btn) {
  document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  materiaAtual = m;
}
function selecionarQtd(q, btn) {
  document.querySelectorAll('.qtd-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  qtdAtual = q;
}

function iniciarSessao() {
  let cards = [];
  if (materiaAtual === 'todas') Object.values(banco).forEach(a => cards.push(...a));
  else cards = [...(banco[materiaAtual] || [])];
  cards.sort(() => Math.random() - 0.5);
  deck = cards.slice(0, Math.min(qtdAtual, cards.length));
  indice = 0;
  resultados = {acertei:0, revisar:0, errei:0};
  cardsMarcados = [];
  document.getElementById('tela-config').style.display = 'none';
  document.getElementById('tela-resultado').style.display = 'none';
  document.getElementById('tela-estudo').style.display = 'block';
  mostrarCard();
}

function mostrarCard() {
  if (indice >= deck.length) { mostrarResultado(); return; }
  const card = deck[indice];

  // Reseta estado
  document.getElementById('resposta-input').value = '';
  document.getElementById('resposta-input').disabled = false;
  document.getElementById('btn-verificar').disabled = false;
  document.getElementById('card-verso').classList.remove('show');

  // Preenche pergunta
  document.getElementById('card-pergunta').innerHTML = card.f;

  atualizarProgresso();

  // Re-renderiza KaTeX
  if (window.renderMathInElement) {
    setTimeout(() => renderMathInElement(document.getElementById('tela-estudo'), {
      delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
    }), 80);
  }

  // Foca no campo
  setTimeout(() => document.getElementById('resposta-input').focus(), 100);
}

function verificar() {
  const card = deck[indice];
  const sua = document.getElementById('resposta-input').value.trim();

  if (!sua) {
    document.getElementById('resposta-input').style.borderColor = '#d94f4f';
    setTimeout(() => document.getElementById('resposta-input').style.borderColor = '', 1000);
    return;
  }

  // Bloqueia edição
  document.getElementById('resposta-input').disabled = true;
  document.getElementById('btn-verificar').disabled = true;

  // Preenche gabarito
  document.getElementById('sua-resposta').textContent = sua;
  document.getElementById('gabarito-texto').innerHTML = card.v;
  document.getElementById('dica-texto').innerHTML = card.d || '';

  // Mostra verso
  document.getElementById('card-verso').classList.add('show');

  // Re-renderiza KaTeX no verso
  if (window.renderMathInElement) {
    setTimeout(() => renderMathInElement(document.getElementById('card-verso'), {
      delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
    }), 80);
  }

  // Scrolla para mostrar o gabarito
  setTimeout(() => document.getElementById('card-verso').scrollIntoView({behavior:'smooth', block:'nearest'}), 150);
}

// Enter no textarea não submete (Shift+Enter = nova linha, Enter = verificar)
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('resposta-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!document.getElementById('btn-verificar').disabled) verificar();
    }
  });
});

function avaliar(tipo) {
  resultados[tipo]++;
  cardsMarcados.push({card: deck[indice], tipo});
  indice++;
  mostrarCard();
}

function atualizarProgresso() {
  const pct = (indice / deck.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-texto').textContent = `Card ${indice+1} de ${deck.length}`;
  document.getElementById('prog-rest').textContent = `${deck.length - indice} restantes`;
}

function mostrarResultado() {
  document.getElementById('tela-estudo').style.display = 'none';
  document.getElementById('tela-resultado').style.display = 'block';
  document.getElementById('res-acertei').textContent = resultados.acertei;
  document.getElementById('res-revisar').textContent = resultados.revisar;
  document.getElementById('res-errei').textContent = resultados.errei;
  const pct = Math.round((resultados.acertei / deck.length) * 100);
  document.getElementById('res-emoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
  document.getElementById('res-titulo').textContent = pct >= 80 ? 'Ótimo desempenho!' : pct >= 50 ? 'Bom progresso!' : 'Continue praticando!';
}

function rever() {
  const errados = cardsMarcados.filter(c => c.tipo==='errei'||c.tipo==='revisar').map(c => c.card);
  if (!errados.length) { novaSessao(); return; }
  deck = errados; indice = 0;
  resultados = {acertei:0, revisar:0, errei:0};
  cardsMarcados = [];
  document.getElementById('tela-resultado').style.display = 'none';
  document.getElementById('tela-estudo').style.display = 'block';
  mostrarCard();
}

function novaSessao() {
  document.getElementById('tela-resultado').style.display = 'none';
  document.getElementById('tela-config').style.display = 'block';
}
</script>
</body>
</html>
