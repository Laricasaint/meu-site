<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulados - Meus Estudos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})">
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; }
    header { background-color: #2d6a9f; color: white; padding: 20px 30px; display: flex; align-items: center; gap: 16px; }
    header a { color: white; text-decoration: none; font-size: 1.4rem; }
    header h1 { margin: 0; font-size: 1.4rem; }
    main { padding: 30px; max-width: 800px; margin: 0 auto; }

    .config-card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .config-card h2 { margin: 0 0 20px; color: #2d6a9f; font-size: 1.1rem; }
    .form-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
    .form-group label { font-size: 0.85rem; color: #555; font-weight: bold; }
    .form-group select, .form-group input { padding: 10px 14px; border-radius: 8px; border: 1px solid #d0dde8; font-size: 0.95rem; background: #f8fafc; }
    .btn-gerar { width: 100%; padding: 14px; background: #2d6a9f; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .btn-gerar:hover { background: #1f5080; }
    .btn-gerar:disabled { background: #90b4d0; cursor: not-allowed; }

    .loading { text-align: center; padding: 40px; color: #2d6a9f; font-size: 1rem; display: none; }
    .loading .spinner { width: 40px; height: 40px; border: 4px solid #ddeaf5; border-top-color: #2d6a9f; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .simulado-container { display: none; }

    .questao { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .questao .numero { font-size: 0.8rem; color: #2d6a9f; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .questao .enunciado { font-size: 1rem; color: #222; margin-bottom: 16px; line-height: 1.6; }

    .alternativa { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 2px solid #e8f0f8; transition: all 0.15s; font-size: 0.95rem; line-height: 1.5; }
    .alternativa:hover { background: #f0f6fc; border-color: #b0cfe8; }
    .alternativa.selecionada { border-color: #2d6a9f; background: #e8f2fb; }
    .alternativa.correta { border-color: #2e9e5b; background: #e8f8ee; color: #1a6b3a; }
    .alternativa.errada { border-color: #d94f4f; background: #fdf0f0; color: #8b2020; }
    .letra { font-weight: bold; min-width: 22px; color: #2d6a9f; }
    .alternativa.correta .letra { color: #1a6b3a; }
    .alternativa.errada .letra { color: #8b2020; }

    /* RESOLUÇÃO */
    .resolucao { margin-top: 16px; border-radius: 10px; overflow: hidden; display: none; }
    .resolucao.show { display: block; }
    .resolucao-header { padding: 12px 16px; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
    .resolucao.acerto .resolucao-header { background: #d4f0e0; color: #1a6b3a; }
    .resolucao.erro .resolucao-header { background: #fad5d5; color: #8b2020; }
    .resolucao-body { padding: 16px; background: #f8fcff; border: 1px solid #ddeaf5; border-top: none; border-radius: 0 0 10px 10px; }
    .resolucao-explicacao { font-size: 0.92rem; color: #333; line-height: 1.7; margin-bottom: 12px; }
    .resolucao-dica { background: #fff8e8; border-left: 3px solid #f5c842; padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 0.85rem; color: #7a5500; line-height: 1.6; }
    .resolucao-dica strong { display: block; margin-bottom: 4px; }
    .resolucao-passo { background: #f0f6fc; border-left: 3px solid #2d6a9f; padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 0.88rem; color: #1a4f78; line-height: 1.7; margin-top: 10px; }
    .resolucao-passo strong { display: block; margin-bottom: 4px; color: #2d6a9f; }

    .resultado-card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; margin-bottom: 24px; display: none; }
    .resultado-card h2 { color: #2d6a9f; margin: 0 0 8px; }
    .resultado-card .nota { font-size: 3rem; font-weight: bold; color: #2d6a9f; margin: 12px 0; }
    .resultado-card p { color: #555; margin: 0; }
    .btn-novo { width: 100%; padding: 14px; background: #e8f2fb; color: #2d6a9f; border: 2px solid #b0cfe8; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: background 0.2s; display: none; margin-bottom: 30px; }
    .btn-novo:hover { background: #d0e6f5; }
    .erro-msg { background: #fdf0f0; color: #8b2020; border-radius: 10px; padding: 16px 20px; margin-top: 12px; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>

<header>
  <a href="index.html">← Voltar</a>
  <h1>✏️ Simulados com IA</h1>
</header>

<main>
  <div class="config-card">
    <h2>⚙️ Configurar simulado</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Matéria</label>
        <select id="materia">
          <option value="Matemática Atuarial">📐 Matemática Atuarial</option>
          <option value="Probabilidade">🎲 Probabilidade</option>
          <option value="Matemática Financeira">💰 Matemática Financeira</option>
          <option value="Teoria do Risco">⚠️ Teoria do Risco</option>
          <option value="Estatística">📊 Estatística</option>
        </select>
      </div>
      <div class="form-group">
        <label>Assunto (opcional)</label>
        <input type="text" id="assunto" placeholder="ex: anuidades, variância...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Número de questões</label>
        <select id="qtd">
          <option value="5">5 questões</option>
          <option value="10" selected>10 questões</option>
          <option value="15">15 questões</option>
        </select>
      </div>
      <div class="form-group">
        <label>Dificuldade</label>
        <select id="dificuldade">
          <option value="fácil">🟢 Fácil</option>
          <option value="médio" selected>🟡 Médio</option>
          <option value="difícil">🔴 Difícil</option>
        </select>
      </div>
    </div>
    <button class="btn-gerar" id="btnGerar" onclick="gerarSimulado()">🤖 Gerar simulado com IA</button>
    <div class="erro-msg" id="erroMsg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Gerando seu simulado com IA...
  </div>

  <div class="resultado-card" id="resultadoCard">
    <h2>Simulado concluído! 🎉</h2>
    <div class="nota" id="notaFinal"></div>
    <p id="textoResultado"></p>
  </div>

  <button class="btn-novo" id="btnNovo" onclick="novoSimulado()">🔄 Gerar novo simulado</button>
  <div class="simulado-container" id="simuladoContainer"></div>
</main>

<script>
  const CHAVE = 'SUA_CHAVE_AQUI'; // ← SUBSTITUA AQUI

  let questoes = [];
  let respostas = {};
  let respondidas = 0;

  async function gerarSimulado() {
    const materia = document.getElementById('materia').value;
    const assunto = document.getElementById('assunto').value;
    const qtd = document.getElementById('qtd').value;
    const dificuldade = document.getElementById('dificuldade').value;
    const topico = assunto ? `${materia} — ${assunto}` : materia;

    document.getElementById('btnGerar').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('simuladoContainer').style.display = 'none';
    document.getElementById('resultadoCard').style.display = 'none';
    document.getElementById('btnNovo').style.display = 'none';
    document.getElementById('erroMsg').style.display = 'none';
    document.getElementById('simuladoContainer').innerHTML = '';
    questoes = []; respostas = {}; respondidas = 0;

    const prompt = `Crie ${qtd} questões de múltipla escolha sobre "${topico}" com dificuldade ${dificuldade}, para faculdade/vestibular.

Responda APENAS com um JSON válido neste formato, sem texto antes ou depois:
{
  "questoes": [
    {
      "enunciado": "texto da questão",
      "alternativas": ["A) texto", "B) texto", "C) texto", "D) texto", "E) texto"],
      "correta": 0,
      "explicacao": "explicação completa da resposta correta em 2-3 frases",
      "resolucao_passo_a_passo": "Passo 1: ... Passo 2: ... Passo 3: ... (como resolver este tipo de questão)",
      "dica": "dica rápida ou macete para nunca mais errar este tipo de questão"
    }
  ]
}

O campo "correta" é o índice (0 a 4) da alternativa correta.
Em "resolucao_passo_a_passo" explique o raciocínio de resolução de forma didática.
Em "dica" dê um macete prático e memorável.`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': CHAVE,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 4000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error?.message || 'Erro na API');
      const texto = data.content[0].text;
      const json = JSON.parse(texto.replace(/```json|```/g, '').trim());
      questoes = json.questoes;
      renderSimulado();
    } catch (e) {
      document.getElementById('erroMsg').style.display = 'block';
      document.getElementById('erroMsg').textContent = '❌ Erro ao gerar simulado: ' + e.message;
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('btnGerar').disabled = false;
    }
  }

  function renderSimulado() {
    const container = document.getElementById('simuladoContainer');
    container.innerHTML = '';
    container.style.display = 'block';
    const letras = ['A', 'B', 'C', 'D', 'E'];

    questoes.forEach((q, i) => {
      const div = document.createElement('div');
      div.className = 'questao';
      div.id = `q${i}`;
      div.innerHTML = `
        <div class="numero">Questão ${i + 1}</div>
        <div class="enunciado">${q.enunciado}</div>
        <div id="alts${i}">
          ${q.alternativas.map((alt, j) => `
            <div class="alternativa" id="alt${i}_${j}" onclick="responder(${i}, ${j})">
              <span class="letra">${letras[j]})</span>
              <span>${alt.replace(/^[A-E]\)\s*/, '')}</span>
            </div>
          `).join('')}
        </div>
        <div class="resolucao" id="res${i}">
          <div class="resolucao-header" id="res-header${i}"></div>
          <div class="resolucao-body">
            <div class="resolucao-explicacao" id="res-exp${i}"></div>
            <div class="resolucao-passo" id="res-passo${i}">
              <strong>📝 Como resolver este tipo de questão:</strong>
              <span id="res-passo-txt${i}"></span>
            </div>
            <div class="resolucao-dica" id="res-dica${i}">
              <strong>💡 Dica para nunca mais errar:</strong>
              <span id="res-dica-txt${i}"></span>
            </div>
          </div>
        </div>
      `;
      container.appendChild(div);
    });

    // Re-renderiza KaTeX após inserir HTML
    if (window.renderMathInElement) {
      setTimeout(() => renderMathInElement(container, {
        delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
      }), 100);
    }
  }

  function responder(qi, ai) {
    if (respostas[qi] !== undefined) return;
    respostas[qi] = ai;
    respondidas++;

    const correta = questoes[qi].correta;
    const letras = ['A', 'B', 'C', 'D', 'E'];
    const acertou = ai === correta;

    // Marca alternativas
    document.querySelectorAll(`#alts${qi} .alternativa`).forEach((el, j) => {
      el.style.pointerEvents = 'none';
      if (j === correta) el.classList.add('correta');
      if (j === ai && !acertou) el.classList.add('errada');
    });

    // Monta resolução
    const res = document.getElementById(`res${qi}`);
    const header = document.getElementById(`res-header${qi}`);

    res.classList.add('show');
    res.classList.add(acertou ? 'acerto' : 'erro');
    header.innerHTML = acertou
      ? `✅ Correto! Resposta: ${letras[correta]})`
      : `❌ Incorreto. Resposta correta: ${letras[correta]})`;

    document.getElementById(`res-exp${qi}`).innerHTML = questoes[qi].explicacao || '';
    document.getElementById(`res-passo-txt${qi}`).innerHTML = questoes[qi].resolucao_passo_a_passo || '';
    document.getElementById(`res-dica-txt${qi}`).innerHTML = questoes[qi].dica || '';

    // Re-renderiza KaTeX na resolução
    if (window.renderMathInElement) {
      setTimeout(() => renderMathInElement(res, {
        delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
      }), 100);
    }

    if (respondidas === questoes.length) mostrarResultado();
  }

  function mostrarResultado() {
    let acertos = 0;
    questoes.forEach((q, i) => { if (respostas[i] === q.correta) acertos++; });
    const pct = Math.round((acertos / questoes.length) * 100);
    const card = document.getElementById('resultadoCard');
    card.style.display = 'block';
    document.getElementById('notaFinal').textContent = `${acertos}/${questoes.length}`;
    document.getElementById('textoResultado').textContent = `${pct}% de aproveitamento`;
    card.scrollIntoView({ behavior: 'smooth' });
    document.getElementById('btnNovo').style.display = 'block';
  }

  function novoSimulado() {
    document.getElementById('simuladoContainer').style.display = 'none';
    document.getElementById('resultadoCard').style.display = 'none';
    document.getElementById('btnNovo').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
